---
# tasks file for deploy_app

- name: create project directory
  ansible.builtin.file:
    path: /opt/kuber-2026-05_homework/kubernetes-networks
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy all k8s manifests for project
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/opt/kuber-2026-05_homework/kubernetes-networks/{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: "namespace.yaml", dest: "namespace.yaml", mode: "0644" }
    - { src: "deployment.yaml", dest: "deployment.yaml", mode: "0644" }
    - { src: "service.yaml", dest: "service.yaml", mode: "0644" }
    - { src: "gatewayclass.yaml", dest: "gatewayclass.yaml", mode: "0644" }
    - { src: "gateway.yaml", dest: "gateway.yaml", mode: "0644" }
    - { src: "httpRoute.yaml", dest: "httpRoute.yaml", mode: "0644" }

- name: deploy namespace.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/namespace.yaml

- name: deploy deployment.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/deployment.yaml

- name: deploy service.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/service.yaml

- name: deploy gatewayclass.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/gatewayclass.yaml

- name: deploy gateway.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/gateway.yaml

- name: deploy httpRoute.yaml in k3s cluster
  ansible.builtin.shell:
    cmd: kubectl apply -f /opt/kuber-2026-05_homework/kubernetes-networks/httpRoute.yaml
